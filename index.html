<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer Celebration</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --danny: #FF6B35;
    --kristen: #FF3CAC;
    --stephen: #00C4FF;
    --danny-bg: rgba(255,107,53,0.12);
    --kristen-bg: rgba(255,60,172,0.12);
    --stephen-bg: rgba(0,196,255,0.12);
    --gold: #FFD166;
    --silver: #CBD5E0;
    --bronze: #E07A5F;
    --bg: #FFF8F0;
    --surface: #FFFFFF;
    --border: #F0E6DA;
    --text: #1A1207;
    --muted: #A0907E;
    --light: #FAF3EB;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* Sunny background decoration */
  body::before {
    content: '';
    position: fixed;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(255,209,102,0.25) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -150px; left: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(255,107,53,0.12) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 16px 80px;
  }

  /* ── HEADER ── */
  header { text-align: center; margin-bottom: 40px; }

  .sun-icon { font-size: 36px; line-height: 1; margin-bottom: 8px; }

  .title {
    font-family: 'Fraunces', serif;
    font-size: clamp(36px, 9vw, 80px);
    font-weight: 900;
    line-height: 0.95;
    color: var(--text);
    letter-spacing: -1px;
  }

  .title span {
    background: linear-gradient(135deg, #FF6B35 0%, #FF3CAC 50%, #784BA0 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    margin-top: 10px;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* ── SCOREBOARD ── */
  .scoreboard {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 44px;
  }

  .player-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 24px 16px 20px;
    text-align: center;
    position: relative;
    transition: transform 0.25s, box-shadow 0.25s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  }

  .player-card.danny { border-color: rgba(255,107,53,0.3); }
  .player-card.kristen { border-color: rgba(255,60,172,0.3); }
  .player-card.stephen { border-color: rgba(0,196,255,0.3); }

  .player-card.leading {
    transform: translateY(-6px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.1);
  }

  .player-card.danny.leading  { background: linear-gradient(160deg, #fff9f6, #fff); border-color: var(--danny); }
  .player-card.kristen.leading { background: linear-gradient(160deg, #fff5fb, #fff); border-color: var(--kristen); }
  .player-card.stephen.leading { background: linear-gradient(160deg, #f5fdff, #fff); border-color: var(--stephen); }

  .crown {
    position: absolute; top: -14px; left: 50%;
    transform: translateX(-50%);
    font-size: 22px;
    display: none;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
  }
  .player-card.leading .crown { display: block; }

  .player-avatar {
    width: 48px; height: 48px;
    border-radius: 50%;
    margin: 0 auto 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 900;
  }
  .danny .player-avatar  { background: var(--danny-bg); color: var(--danny); }
  .kristen .player-avatar { background: var(--kristen-bg); color: var(--kristen); }
  .stephen .player-avatar { background: var(--stephen-bg); color: var(--stephen); }

  .player-name {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .danny .player-name  { color: var(--danny); }
  .kristen .player-name { color: var(--kristen); }
  .stephen .player-name { color: var(--stephen); }

  .player-score {
    font-family: 'Fraunces', serif;
    font-size: 56px;
    font-weight: 900;
    line-height: 1;
  }
  .danny .player-score  { color: var(--danny); }
  .kristen .player-score { color: var(--kristen); }
  .stephen .player-score { color: var(--stephen); }

  .player-pts-label { font-size: 11px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-top: 2px; }

  .wins-row {
    display: flex; justify-content: center; gap: 4px; margin-top: 10px; flex-wrap: wrap; min-height: 20px;
  }
  .win-pip {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }
  .win-pip.gold   { background: rgba(255,209,102,0.25); }
  .win-pip.silver { background: rgba(203,213,224,0.3); }
  .win-pip.bronze { background: rgba(224,122,95,0.2); }

  /* ── GAMES SECTION ── */
  .section-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 16px;
  }
  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }
  .section-rule { flex: 1; height: 1px; background: var(--border); }
  .games-done-count { font-size: 12px; color: var(--muted); }

  .games-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 40px;
  }

  /* ── GAME CARD ── */
  .game-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color 0.2s, opacity 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }

  .game-card.scored {
    opacity: 0.75;
    border-color: #E8F5E9;
  }

  .game-header {
    display: flex; align-items: center;
    padding: 14px 18px;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    background: var(--light);
  }

  .game-card.scored .game-header { background: #F1FAF1; border-bottom-color: #E0F0E0; }

  .game-number {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    flex-shrink: 0;
  }
  .game-card.scored .game-number { background: #C8E6C9; color: #388E3C; }

  .game-title {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 700;
    flex: 1;
    color: var(--text);
  }
  .game-card.scored .game-title { color: #5A7A5A; }

  .game-status-badge {
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .badge-pending { background: #FEF3C7; color: #D97706; }
  .badge-done    { background: #D1FAE5; color: #059669; }

  .undo-btn {
    background: none;
    border: 1px solid #E0D0C0;
    border-radius: 8px;
    width: 30px; height: 30px;
    cursor: pointer;
    color: var(--muted);
    font-size: 14px;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .undo-btn:hover { background: #FEE2E2; border-color: #FCA5A5; color: #EF4444; }

  /* ── SCORING BODY ── */
  .game-body { padding: 16px 18px; }

  /* Scored result display */
  .scored-result {
    display: flex; gap: 10px; flex-wrap: wrap;
  }

  .result-place {
    flex: 1;
    min-width: 80px;
    border-radius: 12px;
    padding: 10px 12px;
    text-align: center;
  }
  .result-place.p1 { background: rgba(255,209,102,0.15); border: 1px solid rgba(255,209,102,0.4); }
  .result-place.p2 { background: rgba(203,213,224,0.2); border: 1px solid rgba(203,213,224,0.5); }
  .result-place.p3 { background: rgba(224,122,95,0.1); border: 1px solid rgba(224,122,95,0.3); }

  .result-medal { font-size: 20px; }
  .result-pts { font-size: 10px; color: var(--muted); margin: 2px 0; letter-spacing: 1px; }
  .result-name {
    font-family: 'Fraunces', serif;
    font-size: 15px;
    font-weight: 700;
  }
  .result-place.p1 .result-name.danny   { color: var(--danny); }
  .result-place.p1 .result-name.kristen { color: var(--kristen); }
  .result-place.p1 .result-name.stephen { color: var(--stephen); }
  .result-place.p2 .result-name, .result-place.p3 .result-name { color: var(--text); }

  /* ── PLACE PICKER ── */
  .place-rows {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .place-row {
    display: grid;
    grid-template-columns: 90px 1fr;
    align-items: center;
    gap: 10px;
  }

  .place-row-label {
    display: flex; align-items: center; gap: 6px;
  }
  .place-medal { font-size: 20px; }
  .place-pts-text {
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
  }

  .player-btn-group {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }

  .player-btn {
    padding: 10px 6px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: var(--light);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    transition: all 0.15s;
    text-align: center;
    white-space: nowrap;
  }

  .player-btn:hover {
    border-color: #ccc;
    color: var(--text);
    background: #fff;
  }

  /* Active states */
  .player-btn.sel-danny   { background: var(--danny-bg);   border-color: var(--danny);   color: var(--danny); }
  .player-btn.sel-kristen { background: var(--kristen-bg); border-color: var(--kristen); color: var(--kristen); }
  .player-btn.sel-stephen { background: var(--stephen-bg); border-color: var(--stephen); color: var(--stephen); }

  /* ── LOG BUTTON ── */
  .log-btn-wrap { margin-top: 14px; }

  .log-btn {
    width: 100%;
    padding: 13px;
    border-radius: 12px;
    border: none;
    font-family: 'Fraunces', serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .log-btn:enabled {
    background: linear-gradient(135deg, #FF6B35, #FF3CAC);
    color: #fff;
    box-shadow: 0 4px 16px rgba(255,60,172,0.3);
  }
  .log-btn:enabled:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(255,60,172,0.4);
  }
  .log-btn:disabled {
    background: var(--border);
    color: var(--muted);
    cursor: default;
  }

  .log-btn-hint {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* ── RESET ── */
  .reset-wrap { text-align: center; }
  .reset-btn {
    padding: 10px 24px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .reset-btn:hover { border-color: #FCA5A5; color: #EF4444; background: #FEF2F2; }

  /* Flash */
  @keyframes scorePop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  .pop { animation: scorePop 0.3s ease; }

  /* Mobile */
  @media (max-width: 560px) {
    .player-score { font-size: 42px; }
    .player-name { font-size: 15px; }
    .player-card { padding: 18px 10px 14px; border-radius: 16px; }
    .place-row { grid-template-columns: 70px 1fr; }
    .player-btn { font-size: 12px; padding: 9px 4px; }
    .result-place { min-width: 60px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="sun-icon">☀️</div>
    <div class="title">Summer <span>Celebration</span></div>
    <div class="tagline">Danny &nbsp;·&nbsp; Kristen &nbsp;·&nbsp; Stephen</div>
  </header>

  <!-- SCOREBOARD -->
  <div class="scoreboard">
    <div class="player-card danny" id="card-danny">
      <div class="crown">👑</div>
      <div class="player-avatar">D</div>
      <div class="player-name">Danny</div>
      <div class="player-score" id="score-danny">0</div>
      <div class="player-pts-label">points</div>
      <div class="wins-row" id="wins-danny"></div>
    </div>
    <div class="player-card kristen" id="card-kristen">
      <div class="crown">👑</div>
      <div class="player-avatar">K</div>
      <div class="player-name">Kristen</div>
      <div class="player-score" id="score-kristen">0</div>
      <div class="player-pts-label">points</div>
      <div class="wins-row" id="wins-kristen"></div>
    </div>
    <div class="player-card stephen" id="card-stephen">
      <div class="crown">👑</div>
      <div class="player-avatar">S</div>
      <div class="player-name">Stephen</div>
      <div class="player-score" id="score-stephen">0</div>
      <div class="player-pts-label">points</div>
      <div class="wins-row" id="wins-stephen"></div>
    </div>
  </div>

  <!-- GAMES -->
  <div class="section-header">
    <div class="section-title">🎮 Games</div>
    <div class="section-rule"></div>
    <div class="games-done-count" id="games-done-count">0 / 10 logged</div>
  </div>

  <div class="games-list" id="games-list"></div>

  <div class="reset-wrap">
    <button class="reset-btn" onclick="resetAll()">↺ &nbsp;Reset all scores</button>
  </div>

</div>

<script>
const GAMES = [
  { name: "Heroes of Arcadia", emoji: "⚔️" },
  { name: "Mario Kart",        emoji: "🏎️" },
  { name: "Mario Party",       emoji: "🎲" },
  { name: "Game 4",            emoji: "🎮" },
  { name: "Game 5",            emoji: "🎮" },
  { name: "Game 6",            emoji: "🎮" },
  { name: "Game 7",            emoji: "🎮" },
  { name: "Game 8",            emoji: "🎮" },
  { name: "Game 9",            emoji: "🎮" },
  { name: "Game 10",           emoji: "🎮" },
];

const PLAYERS = ["danny", "kristen", "stephen"];
const PNAMES  = { danny: "Danny", kristen: "Kristen", stephen: "Stephen" };
const POINTS  = { 1: 3, 2: 2, 3: 1 };
const MEDALS  = { 1: "🥇", 2: "🥈", 3: "🥉" };
const PTS_LABEL = { 1: "3 pts", 2: "2 pts", 3: "1 pt" };

let results = Array(GAMES.length).fill(null);
let pending = Array(GAMES.length).fill(null).map(() => ({ 1: null, 2: null, 3: null }));

function calcScores() {
  const scores = { danny: 0, kristen: 0, stephen: 0 };
  const wins   = { danny: [], kristen: [], stephen: [] };
  results.forEach(r => {
    if (!r) return;
    [1, 2, 3].forEach(place => {
      const p = r[place];
      if (p) { scores[p] += POINTS[place]; wins[p].push(place); }
    });
  });
  return { scores, wins };
}

function renderScores() {
  const { scores, wins } = calcScores();
  const maxScore = Math.max(...Object.values(scores));

  PLAYERS.forEach(p => {
    const el = document.getElementById('score-' + p);
    const old = parseInt(el.textContent);
    el.textContent = scores[p];
    if (scores[p] !== old) { el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); }

    const card = document.getElementById('card-' + p);
    card.classList.toggle('leading', scores[p] === maxScore && scores[p] > 0);

    document.getElementById('wins-' + p).innerHTML = wins[p].map(place => {
      const cls = place === 1 ? 'gold' : place === 2 ? 'silver' : 'bronze';
      return `<span class="win-pip ${cls}">${MEDALS[place]}</span>`;
    }).join('');
  });

  const done = results.filter(Boolean).length;
  document.getElementById('games-done-count').textContent = `${done} / ${GAMES.length} logged`;
}

function renderGames() {
  const list = document.getElementById('games-list');
  list.innerHTML = '';

  GAMES.forEach((game, i) => {
    const card = document.createElement('div');
    card.className = 'game-card' + (results[i] ? ' scored' : '');

    if (results[i]) {
      const r = results[i];
      const placeDivs = [1, 2, 3].map(place => {
        const p = r[place];
        return `
          <div class="result-place p${place}">
            <div class="result-medal">${MEDALS[place]}</div>
            <div class="result-pts">${PTS_LABEL[place]}</div>
            <div class="result-name ${place === 1 ? p : ''}">${PNAMES[p]}</div>
          </div>`;
      }).join('');

      card.innerHTML = `
        <div class="game-header">
          <div class="game-number">✓</div>
          <div class="game-title">${game.emoji} ${game.name}</div>
          <span class="game-status-badge badge-done">Done</span>
          <button class="undo-btn" onclick="undoGame(${i})" title="Edit result">↺</button>
        </div>
        <div class="game-body">
          <div class="scored-result">${placeDivs}</div>
        </div>`;
    } else {
      const pend = pending[i];
      const canLog = pend[1] && pend[2] && pend[3] && new Set([pend[1], pend[2], pend[3]]).size === 3;

      const missingCount = [1,2,3].filter(pl => !pend[pl]).length;
      const hintText = canLog
        ? 'All places set — ready to log!'
        : `Pick ${missingCount} more place${missingCount !== 1 ? 's' : ''} to continue`;

      const makePlaceRow = (place) => {
        const btns = PLAYERS.map(p => {
          const sel = pend[place] === p ? `sel-${p}` : '';
          return `<button class="player-btn ${sel}" onclick="selectPlace(${i},${place},'${p}')">${PNAMES[p]}</button>`;
        }).join('');
        return `
          <div class="place-row">
            <div class="place-row-label">
              <span class="place-medal">${MEDALS[place]}</span>
              <span class="place-pts-text">${PTS_LABEL[place]}</span>
            </div>
            <div class="player-btn-group">${btns}</div>
          </div>`;
      };

      card.innerHTML = `
        <div class="game-header">
          <div class="game-number">${i + 1}</div>
          <div class="game-title">${game.emoji} ${game.name}</div>
          <span class="game-status-badge badge-pending">Pending</span>
        </div>
        <div class="game-body">
          <div class="place-rows">
            ${makePlaceRow(1)}
            ${makePlaceRow(2)}
            ${makePlaceRow(3)}
          </div>
          <div class="log-btn-wrap">
            <button class="log-btn" onclick="submitGame(${i})" ${canLog ? '' : 'disabled'}>
              Log Result
            </button>
            <div class="log-btn-hint">${hintText}</div>
          </div>
        </div>`;
    }

    list.appendChild(card);
  });
}

function selectPlace(gameIdx, place, player) {
  const pend = pending[gameIdx];
  [1, 2, 3].forEach(pl => { if (pl !== place && pend[pl] === player) pend[pl] = null; });
  pend[place] = pend[place] === player ? null : player;
  renderGames();
}

function submitGame(gameIdx) {
  const pend = pending[gameIdx];
  if (!pend[1] || !pend[2] || !pend[3]) return;
  if (new Set([pend[1], pend[2], pend[3]]).size !== 3) return;
  results[gameIdx] = { ...pend };
  renderGames();
  renderScores();
}

function undoGame(gameIdx) {
  results[gameIdx] = null;
  pending[gameIdx] = { 1: null, 2: null, 3: null };
  renderGames();
  renderScores();
}

function resetAll() {
  if (!confirm('Reset all scores and start fresh?')) return;
  results = Array(GAMES.length).fill(null);
  pending = Array(GAMES.length).fill(null).map(() => ({ 1: null, 2: null, 3: null }));
  renderGames();
  renderScores();
}

renderGames();
renderScores();
</script>
</body>
</html>
